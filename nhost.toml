# Nhost Run service configuration
# This starts the unified standalone backend on Nhost Run (optional — deploy to Plesk or any Node host instead).

name = "tastyplates-backend"

[[run.services]]
name = "backend"
port = 3000
publish = true

[[run.services.resources.compute]]
cpu = 500
memory = 1024

[[run.services.command]]
value = "node dist/server.js"

[[run.services.healthcheck]]
port = 3000
initialDelaySeconds = 30
probePath = "/healthz"
